<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkit Multi-Chain Swap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0d111c] text-white font-sans overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Custom Icons ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>,
                globe: <React.Fragment><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></React.Fragment>,
                alert: <React.Fragment><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></React.Fragment>,
                wallet: <React.Fragment><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></React.Fragment>,
                arrowDown: <React.Fragment><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></React.Fragment>,
                refresh: <React.Fragment><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></React.Fragment>,
                chevronDown: <polyline points="6 9 12 15 18 9"></polyline>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- Configuration ---
        const NETWORKS = {
            ink: { id: '0xba5ed', name: 'Ink Sepolia', color: 'purple', icon: 'https://raw.githubusercontent.com/ethereum/ethereum-org/main/public/assets/eth-diamond-purple.png' },
            base: { id: '0x2105', name: 'Base', color: 'blue', icon: 'https://avatars.githubusercontent.com/u/108554348?s=200&v=4' },
            polygon: { id: '0x89', name: 'Polygon', color: 'indigo', icon: 'https://cryptologos.cc/logos/polygon-matic-logo.png' },
            arbitrum: { id: '0xa4b1', name: 'Arbitrum', color: 'cyan', icon: 'https://cryptologos.cc/logos/arbitrum-arb-logo.png' },
            optimism: { id: '0xa', name: 'Optimism', color: 'red', icon: 'https://cryptologos.cc/logos/optimism-ethereum-op-logo.png' },
            bnb: { id: '0x38', name: 'BNB Chain', color: 'yellow', icon: 'https://cryptologos.cc/logos/bnb-bnb-logo.png' }
        };

        const TOKENS = [
            { symbol: 'ETH', name: 'Ethereum', icon: 'https://cryptologos.cc/logos/ethereum-eth-logo.svg' },
            { symbol: 'USDT', name: 'Tether', icon: 'https://cryptologos.cc/logos/tether-usdt-logo.svg' },
            { symbol: 'USDC', name: 'USD Coin', icon: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.svg' }
        ];

        const translations = {
            en: {
                connect: "Connect Wallet", switchNet: "Switch to", pay: "You Pay",
                receive: "You Receive", swapBtn: "Swap Now", enterAmount: "Enter an amount",
                feeInfo: "Includes 0.5% routing fee", swapping: "Swapping...",
                success: "Swap Successful!", balance: "Balance", waitingWallet: "Check your wallet...",
                selectToken: "Select Token"
            },
            fr: {
                connect: "Connecter Wallet", switchNet: "Passer à", pay: "Vous Payez",
                receive: "Vous Recevez", swapBtn: "Échanger", enterAmount: "Entrez un montant",
                feeInfo: "Inclut 0.5% de frais de routage", swapping: "Échange en cours...",
                success: "Échange Réussi !", balance: "Solde", waitingWallet: "Vérifiez votre portefeuille...",
                selectToken: "Choisir Token"
            },
            zh: {
                connect: "连接钱包", switchNet: "切换至", pay: "您支付",
                receive: "您接收", swapBtn: "立即兑换", enterAmount: "输入金额",
                feeInfo: "包含 0.5% 路由费", swapping: "兑换中...",
                success: "兑换成功！", balance: "余额", waitingWallet: "检查您的钱包...",
                selectToken: "选择代币"
            }
        };

        // --- Main App Component ---
        function App() {
            const [account, setAccount] = useState('');
            const [chainId, setChainId] = useState('');
            const [selectedNetKey, setSelectedNetKey] = useState('ink');
            const [tokenFrom, setTokenFrom] = useState(TOKENS[0]);
            const [tokenTo, setTokenTo] = useState(TOKENS[1]);
            const [amountFrom, setAmountFrom] = useState('');
            const [amountTo, setAmountTo] = useState('');
            const [lang, setLang] = useState('en');
            const [status, setStatus] = useState('');
            const [isSwapping, setIsSwapping] = useState(false);
            const [showNetMenu, setShowNetMenu] = useState(false);
            const [showTokenMenu, setShowTokenMenu] = useState(null); // 'from' or 'to'

            const t = translations[lang];
            const activeNet = NETWORKS[selectedNetKey];
            const isCorrectNet = chainId === activeNet.id;

            const connectWallet = async () => {
                try {
                    if (typeof window.ethereum !== 'undefined') {
                        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                        setAccount(accounts[0]);
                        const chain = await window.ethereum.request({ method: 'eth_chainId' });
                        setChainId(chain);
                    } else {
                        throw new Error("NoWallet");
                    }
                } catch (err) {
                    setStatus('⚠️ Using test account...');
                    setTimeout(() => {
                        setAccount('0xf9a6...c760');
                        setChainId(activeNet.id);
                        setStatus('');
                    }, 1500);
                }
            };

            const switchNetwork = async (netKey) => {
                const net = NETWORKS[netKey];
                setSelectedNetKey(netKey);
                setShowNetMenu(false);
                
                if (!account) return;

                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: net.id }],
                    });
                    setChainId(net.id);
                } catch (err) {
                    setStatus(`⚠️ Simulation: Switched to ${net.name}`);
                    setTimeout(() => {
                        setChainId(net.id);
                        setStatus('');
                    }, 1500);
                }
            };

            const handleAmountChange = (val) => {
                setAmountFrom(val);
                if (val && !isNaN(val)) {
                    // Mock exchange calculation
                    setAmountTo((parseFloat(val) * 0.995 * (tokenFrom.symbol === 'ETH' ? 3500 : 1)).toFixed(2));
                } else {
                    setAmountTo('');
                }
            };

            const handleSwap = () => {
                setIsSwapping(true);
                setStatus(t.swapping);
                setTimeout(() => {
                    setIsSwapping(false);
                    setStatus(t.success);
                    setAmountFrom('');
                    setAmountTo('');
                    setTimeout(() => setStatus(''), 3000);
                }, 2000);
            };

            return (
                <div className="min-h-screen flex flex-col items-center pt-24 px-4 pb-12 relative overflow-hidden bg-[#0a0d14]">
                    {/* Background Visuals */}
                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-gradient-to-b from-purple-500/10 to-transparent pointer-events-none"></div>

                    {/* Navbar */}
                    <nav className="fixed top-0 left-0 right-0 p-4 sm:p-6 flex justify-between items-center max-w-7xl mx-auto z-40 backdrop-blur-md">
                        <div className="flex items-center gap-2 font-black text-2xl tracking-tighter cursor-pointer">
                            <div className="bg-gradient-to-br from-purple-500 to-blue-500 p-1.5 rounded-xl shadow-lg shadow-purple-500/20">
                                <Icon name="activity" className="text-white" size={24} />
                            </div>
                            <span>Inkit</span>
                        </div>

                        <div className="flex items-center gap-2">
                            {/* Lang Dropdown */}
                            <div className="hidden sm:flex items-center bg-[#131a2a] border border-slate-800 rounded-full px-3 py-2">
                                <Icon name="globe" size={16} className="text-slate-400 mr-2" />
                                <select value={lang} onChange={(e) => setLang(e.target.value)} className="bg-transparent text-sm font-medium outline-none text-slate-200">
                                    <option value="en">EN</option><option value="fr">FR</option><option value="zh">ZH</option>
                                </select>
                            </div>

                            {/* Network Switcher */}
                            <div className="relative">
                                <button onClick={() => setShowNetMenu(!showNetMenu)} className="bg-[#131a2a] hover:bg-[#1c2438] border border-slate-800 rounded-full px-4 py-2 flex items-center gap-2 transition-all">
                                    <img src={activeNet.icon} className="w-5 h-5 rounded-full object-contain" />
                                    <span className="hidden md:block text-sm font-bold">{activeNet.name}</span>
                                    <Icon name="chevronDown" size={14} className="text-slate-500" />
                                </button>
                                
                                {showNetMenu && (
                                    <div className="absolute top-12 right-0 w-48 bg-[#1a2133] border border-slate-700 rounded-2xl p-2 shadow-2xl z-50">
                                        {Object.entries(NETWORKS).map(([key, net]) => (
                                            <div key={key} onClick={() => switchNetwork(key)} className="flex items-center gap-3 p-3 hover:bg-slate-700/50 rounded-xl cursor-pointer transition-colors">
                                                <img src={net.icon} className="w-5 h-5 rounded-full object-contain" />
                                                <span className="text-sm font-medium">{net.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Wallet Button */}
                            <button onClick={connectWallet} className="bg-purple-600 hover:bg-purple-700 px-5 py-2 rounded-full text-sm font-bold flex items-center gap-2 shadow-lg shadow-purple-500/20 transition-all active:scale-95">
                                <Icon name="wallet" size={16} />
                                <span>{account ? `${account.slice(0, 6)}...` : t.connect}</span>
                            </button>
                        </div>
                    </nav>

                    {/* Swap Card */}
                    <div className="w-full max-w-[460px] bg-[#131a2a] border border-slate-800 rounded-[32px] p-2 shadow-2xl z-10">
                        
                        {/* Input Area 1 */}
                        <div className="bg-[#0d111c] rounded-[24px] p-5 border border-transparent hover:border-slate-800 transition-colors">
                            <div className="flex justify-between text-xs text-slate-500 mb-3 font-bold uppercase tracking-widest">
                                <span>{t.pay}</span>
                                <span>{t.balance}: 0.00</span>
                            </div>
                            <div className="flex justify-between items-center gap-4">
                                <input type="number" placeholder="0" value={amountFrom} onChange={(e) => handleAmountChange(e.target.value)} className="bg-transparent text-4xl font-medium w-full outline-none placeholder:text-slate-800" />
                                <button onClick={() => setShowTokenMenu('from')} className="flex items-center gap-2 bg-[#1c2438] hover:bg-[#252f4a] p-2 pr-4 rounded-full transition-colors shrink-0">
                                    <img src={tokenFrom.icon} className="w-6 h-6 rounded-full" />
                                    <span className="font-bold">{tokenFrom.symbol}</span>
                                    <Icon name="chevronDown" size={14} className="text-slate-500" />
                                </button>
                            </div>
                        </div>

                        {/* Middle Arrow */}
                        <div className="flex justify-center -my-3 relative z-20">
                            <div className="bg-[#131a2a] p-1 rounded-xl">
                                <button className="bg-[#1c2438] p-2 rounded-xl border border-slate-800 text-slate-400 hover:text-purple-400">
                                    <Icon name="arrowDown" size={18} />
                                </button>
                            </div>
                        </div>

                        {/* Input Area 2 */}
                        <div className="bg-[#0d111c] rounded-[24px] p-5 border border-transparent hover:border-slate-800 transition-colors">
                            <div className="flex justify-between text-xs text-slate-500 mb-3 font-bold uppercase tracking-widest">
                                <span>{t.receive}</span>
                                <span>{t.balance}: 0.00</span>
                            </div>
                            <div className="flex justify-between items-center gap-4">
                                <input type="number" placeholder="0" value={amountTo} readOnly className="bg-transparent text-4xl font-medium w-full outline-none text-slate-300" />
                                <button onClick={() => setShowTokenMenu('to')} className="flex items-center gap-2 bg-[#1c2438] hover:bg-[#252f4a] p-2 pr-4 rounded-full transition-colors shrink-0">
                                    <img src={tokenTo.icon} className="w-6 h-6 rounded-full" />
                                    <span className="font-bold">{tokenTo.symbol}</span>
                                    <Icon name="chevronDown" size={14} className="text-slate-500" />
                                </button>
                            </div>
                        </div>

                        {/* Status Message */}
                        {status && (
                            <div className="mt-4 px-4 py-3 bg-purple-500/10 border border-purple-500/20 rounded-xl text-sm font-medium text-purple-300 text-center flex justify-center items-center gap-2">
                                {isSwapping && <Icon name="refresh" size={16} className="animate-spin" />}
                                {status}
                            </div>
                        )}

                        {/* Bottom Action */}
                        <div className="p-2 mt-2">
                            {!account ? (
                                <button onClick={connectWallet} className="w-full bg-purple-600/10 text-purple-400 hover:bg-purple-600/20 font-bold py-4 rounded-[20px] transition-all text-lg">{t.connect}</button>
                            ) : !isCorrectNet ? (
                                <button onClick={() => switchNetwork(selectedNetKey)} className="w-full bg-red-500/10 text-red-400 hover:bg-red-500/20 font-bold py-4 rounded-[20px] transition-all text-lg">{t.switchNet} {activeNet.name}</button>
                            ) : !amountFrom ? (
                                <button disabled className="w-full bg-[#1c2438] text-slate-600 font-bold py-4 rounded-[20px] text-lg">{t.enterAmount}</button>
                            ) : (
                                <button onClick={handleSwap} disabled={isSwapping} className="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 rounded-[20px] shadow-lg shadow-purple-600/20 active:scale-95 transition-all flex justify-center items-center gap-2 text-lg">
                                    {isSwapping ? t.swapping : t.swapBtn}
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="mt-8 text-slate-500 text-sm font-medium bg-[#131a2a]/40 px-6 py-3 rounded-full border border-slate-800/50">
                        ⚡ {t.feeInfo}
                    </div>

                    {/* Token Selector Modal */}
                    {showTokenMenu && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setShowTokenMenu(null)}></div>
                            <div className="relative w-full max-w-sm bg-[#131a2a] border border-slate-800 rounded-[32px] p-6 shadow-2xl">
                                <h3 className="text-xl font-bold mb-6">{t.selectToken}</h3>
                                <div className="space-y-2">
                                    {TOKENS.map(token => (
                                        <div 
                                            key={token.symbol} 
                                            onClick={() => {
                                                if (showTokenMenu === 'from') setTokenFrom(token);
                                                else setTokenTo(token);
                                                setShowTokenMenu(null);
                                            }}
                                            className="flex items-center justify-between p-4 hover:bg-slate-800 rounded-2xl cursor-pointer transition-colors"
                                        >
                                            <div className="flex items-center gap-4">
                                                <img src={token.icon} className="w-8 h-8 rounded-full" />
                                                <div>
                                                    <p className="font-bold">{token.symbol}</p>
                                                    <p className="text-xs text-slate-500">{token.name}</p>
                                                </div>
                                            </div>
                                            <span className="text-xs text-slate-600 font-medium">Balance: 0.0</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
