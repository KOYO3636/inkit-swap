<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkit - Powered by LI.FI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Ethers.js -->
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
</head>
<body class="bg-[#0a0d14] text-white font-sans overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- Custom Icons ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>,
                globe: <React.Fragment><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></React.Fragment>,
                alert: <React.Fragment><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></React.Fragment>,
                wallet: <React.Fragment><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></React.Fragment>,
                arrowDown: <React.Fragment><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></React.Fragment>,
                refresh: <React.Fragment><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></React.Fragment>,
                chevronDown: <polyline points="6 9 12 15 18 9"></polyline>,
                bridge: <React.Fragment><path d="M3 10c0-2.2 1.8-4 4-4h10c2.2 0 4 1.8 4 4"></path><path d="M3 14c0 2.2 1.8 4 4 4h10c2.2 0 4-1.8 4-4"></path><path d="M7 6v12"></path><path d="M17 6v12"></path></React.Fragment>,
                close: <React.Fragment><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></React.Fragment>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || icons.activity}
                </svg>
            );
        };

        // --- LI.FI CONFIG ---
        const NETWORKS = {
            ink: { id: '0x39', decimalId: 57073, name: 'Ink', rpcs: ['https://rpc-gel.inkonchain.com'], icon: 'https://raw.githubusercontent.com/ethereum/ethereum-org/main/public/assets/eth-diamond-purple.png' },
            base: { id: '0x2105', decimalId: 8453, name: 'Base', rpcs: ['https://rpc.ankr.com/base'], icon: 'https://avatars.githubusercontent.com/u/108554348?s=200&v=4' },
            polygon: { id: '0x89', decimalId: 137, name: 'Polygon', rpcs: ['https://polygon-rpc.com'], icon: 'https://cryptologos.cc/logos/polygon-matic-logo.png' },
            arbitrum: { id: '0xa4b1', decimalId: 42161, name: 'Arbitrum', rpcs: ['https://arb1.arbitrum.io/rpc'], icon: 'https://cryptologos.cc/logos/arbitrum-arb-logo.png' },
            optimism: { id: '0xa', decimalId: 10, name: 'Optimism', rpcs: ['https://mainnet.optimism.io'], icon: 'https://cryptologos.cc/logos/optimism-ethereum-op-logo.png' },
            bnb: { id: '0x38', decimalId: 56, name: 'BNB Chain', rpcs: ['https://bsc-dataseed.binance.org'], icon: 'https://cryptologos.cc/logos/bnb-bnb-logo.png' }
        };

        const TOKEN_ADDRESSES = {
            ETH: {
                base: '0x0000000000000000000000000000000000000000',
                ink: '0x0000000000000000000000000000000000000000',
                polygon: '0x7ceB23fD6bC0adD59E62ac25578270cFf1b9f619',
                arbitrum: '0x0000000000000000000000000000000000000000',
                optimism: '0x0000000000000000000000000000000000000000',
                bnb: '0x2170Ed0880ac9A755fd29B2688956BD959F933F8'
            },
            USDT: {
                base: '0xfde4c96c8593536e31f229ea8f37b2ada2699bb2',
                polygon: '0xc2132D05D31c914a87C6611C10748AEb04B58e8F',
                arbitrum: '0xFd086bC7CD5C481DCC9C85ebE478A1C0b69FCbb9',
                optimism: '0x94b008aA00579c1307B0EF2c499aD98a8ce58e58',
                bnb: '0x55d398326f99059fF775485246999027B3197955'
            },
            USDC: {
                base: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913',
                polygon: '0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359',
                arbitrum: '0xaf88d065e77c8cC2239326C5EDb3A432268e5831',
                optimism: '0x0b2C639c533813f4Aa9D7837CAf62653d097Ff85',
                bnb: '0x8AC76a51cc950d9822D68b83fE1Ad97B32Cd580d'
            },
            ANITA: { ink: '0x0606FC632ee812bA970af72F8489baAa443C4B98' }
        };

        const TOKENS = [
            { symbol: 'ETH', name: 'Ethereum', icon: 'https://cryptologos.cc/logos/ethereum-eth-logo.svg', decimals: 18 },
            { symbol: 'USDT', name: 'Tether', icon: 'https://cryptologos.cc/logos/tether-usdt-logo.svg', decimals: 6 },
            { symbol: 'USDC', name: 'USD Coin', icon: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.svg', decimals: 6 },
            { symbol: 'ANITA', name: 'Anita', icon: 'https://api.dicebear.com/7.x/initials/svg?seed=ANITA&backgroundColor=b624ff', decimals: 18 }
        ];

        const translations = {
            en: { swap: "Swap", bridge: "Bridge", connect: "Connect Wallet", from: "From", to: "To", pay: "Pay", receive: "Receive", btnSwap: "Swap Now", btnBridge: "Bridge Assets", fee: "Fee: 0.5%", waiting: "Fetching Quote...", success: "Success!", selectNet: "Select Network", selectToken: "Select Token", balance: "Balance" },
            fr: { swap: "Échange", bridge: "Pont", connect: "Connecter Wallet", from: "De", to: "À", pay: "Payer", receive: "Recevoir", btnSwap: "Échanger", btnBridge: "Transférer", fee: "Frais: 0.5%", waiting: "Recherche...", success: "Réussi !", selectNet: "Choisir Réseau", selectToken: "Choisir Token", balance: "Solde" },
            zh: { swap: "兑换", bridge: "跨链桥", connect: "连接钱包", from: "从", to: "至", pay: "支付", receive: "接收", btnSwap: "立即兑换", btnBridge: "开始跨链", fee: "费用: 0.5%", waiting: "获取报价...", success: "成功!", selectNet: "选择网络", selectToken: "选择代币", balance: "余额" }
        };

        function App() {
            const [mode, setMode] = useState('swap');
            const [lang, setLang] = useState('en');
            const [account, setAccount] = useState('');
            const [chainId, setChainId] = useState('');
            const [srcNetKey, setSrcNetKey] = useState('base');
            const [destNetKey, setDestNetKey] = useState('ink');
            const [tokenFrom, setTokenFrom] = useState(TOKENS[0]);
            const [tokenTo, setTokenTo] = useState(TOKENS[1]);
            const [amount, setAmount] = useState('');
            const [quoteAmount, setQuoteAmount] = useState('0');
            const [status, setStatus] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [balFrom, setBalFrom] = useState('0.00');
            const [balTo, setBalTo] = useState('0.00');
            const [loadingBal, setLoadingBal] = useState(false);
            const [lifiQuote, setLifiQuote] = useState(null);

            // MISSING STATE VARIABLES FIXED HERE
            const [showSrcNet, setShowSrcNet] = useState(false);
            const [showDestNet, setShowDestNet] = useState(false);
            const [showTokenFrom, setShowTokenFrom] = useState(false);
            const [showTokenTo, setShowTokenTo] = useState(false);

            const t = translations[lang];
            const srcNet = NETWORKS[srcNetKey];
            const destNet = mode === 'swap' ? srcNet : NETWORKS[destNetKey];

            // --- LI.FI Quote Logic ---
            const fetchQuote = useCallback(async (val) => {
                if (!val || isNaN(val) || parseFloat(val) <= 0) {
                    setQuoteAmount('0');
                    return;
                }
                
                try {
                    const fromTokenAddr = TOKEN_ADDRESSES[tokenFrom.symbol]?.[srcNetKey] || TOKEN_ADDRESSES[tokenFrom.symbol]?.base;
                    const toTokenAddr = mode === 'swap' 
                        ? (TOKEN_ADDRESSES[tokenTo.symbol]?.[srcNetKey] || TOKEN_ADDRESSES[tokenTo.symbol]?.base)
                        : (TOKEN_ADDRESSES[tokenFrom.symbol]?.[destNetKey] || TOKEN_ADDRESSES[tokenFrom.symbol]?.base);

                    const fromAmount = ethers.utils.parseUnits(val, tokenFrom.decimals).toString();
                    
                    const url = `https://li.quest/v1/quote?fromChain=${srcNet.decimalId}&toChain=${destNet.decimalId}&fromToken=${fromTokenAddr}&toToken=${toTokenAddr}&fromAmount=${fromAmount}&fromAddress=${account || '0x0000000000000000000000000000000000000000'}`;
                    
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.estimate) {
                        setLifiQuote(data);
                        const outDecimals = mode === 'swap' ? tokenTo.decimals : tokenFrom.decimals;
                        setQuoteAmount(ethers.utils.formatUnits(data.estimate.toAmount, outDecimals));
                    }
                } catch (e) {
                    console.error("LI.FI Quote Error:", e);
                }
            }, [srcNetKey, destNetKey, tokenFrom, tokenTo, mode, account]);

            useEffect(() => {
                const timer = setTimeout(() => fetchQuote(amount), 500);
                return () => clearTimeout(timer);
            }, [amount, fetchQuote]);

            // --- Balance Fetching ---
            const fetchBalance = useCallback(async (token, netKey, user) => {
                if (!user) return '0.00';
                try {
                    const net = NETWORKS[netKey];
                    const provider = new ethers.providers.JsonRpcProvider(net.rpcs[0]);
                    const addr = TOKEN_ADDRESSES[token.symbol]?.[netKey] || '0x0000000000000000000000000000000000000000';

                    if (addr === '0x0000000000000000000000000000000000000000') {
                        const b = await provider.getBalance(user);
                        return parseFloat(ethers.utils.formatEther(b)).toFixed(4);
                    } else {
                        const contract = new ethers.Contract(addr, ["function balanceOf(address) view returns (uint256)"], provider);
                        const b = await contract.balanceOf(user);
                        return parseFloat(ethers.utils.formatUnits(b, token.decimals)).toFixed(2);
                    }
                } catch (e) { return '0.00'; }
            }, []);

            const updateBalances = useCallback(async () => {
                if (!account) return;
                setLoadingBal(true);
                const [b1, b2] = await Promise.all([
                    fetchBalance(tokenFrom, srcNetKey, account),
                    mode === 'swap' ? fetchBalance(tokenTo, srcNetKey, account) : fetchBalance(tokenFrom, destNetKey, account)
                ]);
                setBalFrom(b1); setBalTo(b2);
                setLoadingBal(false);
            }, [account, tokenFrom, tokenTo, srcNetKey, destNetKey, mode, fetchBalance]);

            useEffect(() => {
                updateBalances();
            }, [updateBalances]);

            const connectWallet = async () => {
                if (!window.ethereum) return setStatus('⚠️ Wallet not found.');
                try {
                    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    setAccount(accs[0]);
                } catch (e) { setStatus('⚠️ Failed.'); }
            };

            const handleAction = async () => {
                if (!lifiQuote || !window.ethereum) return;
                setIsLoading(true);
                setStatus('Check your wallet to sign transaction...');
                
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    const signer = provider.getSigner();
                    
                    const { chainId: walletChain } = await provider.getNetwork();
                    if (walletChain !== srcNet.decimalId) {
                        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: srcNet.id }] });
                    }

                    const tx = await signer.sendTransaction(lifiQuote.transactionRequest);
                    setStatus(`✅ Transaction Sent! Hash: ${tx.hash.slice(0,10)}...`);
                    setAmount('');
                } catch (e) {
                    setStatus('❌ Error: ' + (e.reason || e.message).slice(0, 50));
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center pt-20 px-4 pb-10 bg-[#0a0d14]">
                    <div className="absolute top-0 left-1/4 w-[500px] h-[500px] bg-purple-600/5 blur-[120px] pointer-events-none"></div>
                    <div className="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-blue-600/5 blur-[120px] pointer-events-none"></div>

                    <nav className="w-full max-w-5xl flex justify-between items-center mb-10 z-50 backdrop-blur-sm bg-white/5 p-4 rounded-3xl border border-white/5 shadow-2xl">
                        <div className="flex items-center gap-2 font-black text-2xl tracking-tighter">
                            <div className="bg-purple-600 p-1.5 rounded-xl shadow-lg">
                                <Icon name="activity" className="text-white" />
                            </div>
                            <span className="bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Inkit</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={connectWallet} className="bg-[#131a2a] border border-slate-800 px-5 py-2 rounded-full text-sm font-bold flex items-center gap-2 hover:bg-[#1c2438] transition-all">
                                <Icon name="wallet" size={16} className="text-purple-400" />
                                {account ? `${account.slice(0, 6)}...${account.slice(-4)}` : t.connect}
                            </button>
                        </div>
                    </nav>

                    <div className="w-full max-w-[480px] z-10">
                        <div className="flex bg-[#131a2a] p-1.5 rounded-2xl mb-6 border border-slate-800 shadow-xl">
                            <button onClick={() => setMode('swap')} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${mode === 'swap' ? 'bg-[#1c2438] text-white shadow-lg border border-white/5' : 'text-slate-500'}`}>
                                <Icon name="refresh" size={16} className="inline mr-2" /> {t.swap}
                            </button>
                            <button onClick={() => setMode('bridge')} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${mode === 'bridge' ? 'bg-[#1c2438] text-white shadow-lg border border-white/5' : 'text-slate-500'}`}>
                                <Icon name="bridge" size={16} className="inline mr-2" /> {t.bridge}
                            </button>
                        </div>

                        <div className="bg-[#131a2a] border border-slate-800/50 rounded-[32px] p-2 shadow-2xl relative">
                            <div className="bg-[#0d111c] rounded-[26px] p-6 border border-white/5 hover:border-purple-500/30 transition-all duration-300">
                                <div className="flex justify-between items-center mb-5">
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{t.from}</span>
                                        <span className="text-xs text-purple-400 font-bold">{t.balance}: {loadingBal ? '...' : balFrom}</span>
                                    </div>
                                    <button onClick={() => setShowSrcNet(true)} className="flex items-center gap-2 bg-[#1c2438] px-3.5 py-2 rounded-full border border-slate-700 hover:border-purple-500 transition-all">
                                        <img src={srcNet.icon} className="w-4 h-4 rounded-full" />
                                        <span className="text-xs font-bold">{srcNet.name}</span>
                                        <Icon name="chevronDown" size={12} className="text-slate-500" />
                                    </button>
                                </div>
                                <div className="flex justify-between items-center gap-4">
                                    <input type="number" placeholder="0" value={amount} onChange={(e) => setAmount(e.target.value)} className="bg-transparent text-5xl font-bold w-full outline-none placeholder:text-slate-800 text-white tracking-tighter" />
                                    <button onClick={() => setShowTokenFrom(true)} className="flex items-center gap-2.5 bg-[#1c2438] px-4 py-2.5 rounded-full font-bold shrink-0 border border-slate-700 hover:border-purple-500/50 transition-all">
                                        <img src={tokenFrom.icon} className="w-6 h-6 rounded-full" /> 
                                        <span className="text-lg">{tokenFrom.symbol}</span>
                                        <Icon name="chevronDown" size={14} className="text-slate-500" />
                                    </button>
                                </div>
                            </div>

                            <div className="flex justify-center -my-4 relative z-20">
                                <div className="bg-[#131a2a] p-1.5 rounded-2xl">
                                    <div className="bg-[#1c2438] p-3 rounded-xl border border-slate-800 text-purple-400 shadow-xl">
                                        {mode === 'swap' ? <Icon name="arrowDown" size={20} /> : <Icon name="bridge" size={20} />}
                                    </div>
                                </div>
                            </div>

                            <div className="bg-[#0d111c] rounded-[26px] p-6 border border-white/5 hover:border-purple-500/30 transition-all duration-300">
                                <div className="flex justify-between items-center mb-5">
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{t.to}</span>
                                        <span className="text-xs text-purple-400 font-bold">{t.balance}: {loadingBal ? '...' : balTo}</span>
                                    </div>
                                    <button disabled={mode === 'swap'} onClick={() => setShowDestNet(true)} className={`flex items-center gap-2 bg-[#1c2438] px-3.5 py-2 rounded-full border border-slate-700 transition-all ${mode === 'swap' ? 'opacity-50' : 'hover:border-purple-500'}`}>
                                        <img src={destNet.icon} className="w-4 h-4 rounded-full" />
                                        <span className="text-xs font-bold">{destNet.name}</span>
                                        {mode === 'bridge' && <Icon name="chevronDown" size={12} className="text-slate-500" />}
                                    </button>
                                </div>
                                <div className="flex justify-between items-center gap-4">
                                    <div className="text-5xl font-bold text-slate-400 truncate tracking-tighter">
                                        {parseFloat(quoteAmount).toFixed(3)}
                                    </div>
                                    <button onClick={() => setShowTokenTo(true)} className="flex items-center gap-2.5 bg-[#1c2438] px-4 py-2.5 rounded-full font-bold shrink-0 border border-slate-700 hover:border-purple-500/50 transition-all">
                                        <img src={mode === 'swap' ? tokenTo.icon : tokenFrom.icon} className="w-6 h-6 rounded-full" /> 
                                        <span className="text-lg">{mode === 'swap' ? tokenTo.symbol : tokenFrom.symbol}</span>
                                        <Icon name="chevronDown" size={14} className="text-slate-500" />
                                    </button>
                                </div>
                            </div>

                            <div className="p-3 mt-2">
                                {status && <div className="mb-4 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-center text-xs text-red-400 font-semibold">{status}</div>}
                                {!account ? (
                                    <button onClick={connectWallet} className="w-full bg-gradient-to-r from-purple-600 to-purple-800 py-4 rounded-[22px] font-black text-lg active:scale-[0.97] transition-all shadow-xl shadow-purple-600/20">{t.connect}</button>
                                ) : !amount ? (
                                    <button disabled className="w-full bg-[#1c2438] text-slate-600 py-4 rounded-[22px] font-bold text-lg opacity-50 uppercase tracking-widest">{t.enterAmount}</button>
                                ) : (
                                    <button onClick={handleAction} disabled={isLoading} className="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-4 rounded-[22px] font-black shadow-2xl active:scale-[0.97] transition-all text-lg flex justify-center items-center gap-3">
                                        {isLoading && <Icon name="refresh" className="animate-spin" />} {isLoading ? t.waiting : (mode === 'swap' ? t.btnSwap : t.btnBridge)}
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="mt-8 text-center text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] flex items-center justify-center gap-4 opacity-50">
                        <span className="w-12 h-[1px] bg-white/10"></span>
                        Powered by LI.FI
                        <span className="w-12 h-[1px] bg-white/10"></span>
                    </div>

                    {/* Network Modal */}
                    {(showSrcNet || showDestNet) && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 backdrop-blur-md bg-black/80">
                            <div className="relative w-full max-w-sm bg-[#131a2a] border border-white/10 rounded-[36px] p-7 shadow-2xl">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black tracking-tight">{t.selectNet}</h3>
                                    <button onClick={() => {setShowSrcNet(false); setShowDestNet(false);}}><Icon name="close" size={20} /></button>
                                </div>
                                <div className="space-y-2 max-h-[350px] overflow-y-auto">
                                    {Object.entries(NETWORKS).map(([k, n]) => (
                                        <div key={k} onClick={() => { if (showSrcNet) setSrcNetKey(k); else setDestNetKey(k); setShowSrcNet(false); setShowDestNet(false); }} className="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl cursor-pointer transition-all border border-transparent hover:border-white/5">
                                            <img src={n.icon} className="w-10 h-10 rounded-full" />
                                            <span className="text-lg font-bold text-slate-200">{n.name}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Token Modal */}
                    {(showTokenFrom || showTokenTo) && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 backdrop-blur-md bg-black/80">
                            <div className="relative w-full max-w-sm bg-[#131a2a] border border-white/10 rounded-[36px] p-7 shadow-2xl">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black tracking-tight">{t.selectToken}</h3>
                                    <button onClick={() => {setShowTokenFrom(false); setShowTokenTo(false);}}><Icon name="close" size={20} /></button>
                                </div>
                                <div className="space-y-3">
                                    {TOKENS.map(token => (
                                        <div key={token.symbol} onClick={() => { if (showTokenFrom) setTokenFrom(token); else setTokenTo(token); setShowTokenFrom(false); setShowTokenTo(false); }} className="flex items-center gap-5 p-4 rounded-[24px] hover:bg-white/5 cursor-pointer transition-all border border-transparent hover:border-white/5">
                                            <img src={token.icon} className="w-10 h-10 rounded-full shadow-md" />
                                            <div><p className="font-bold text-lg text-slate-200">{token.symbol}</p><p className="text-xs text-slate-500 font-medium">{token.name}</p></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
