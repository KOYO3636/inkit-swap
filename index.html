<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkit - Swap & Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Ethers.js -->
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
</head>
<body class="bg-[#0a0d14] text-white font-sans overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- Custom Icons ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>,
                globe: <React.Fragment><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></React.Fragment>,
                alert: <React.Fragment><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></React.Fragment>,
                wallet: <React.Fragment><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></React.Fragment>,
                arrowDown: <React.Fragment><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></React.Fragment>,
                refresh: <React.Fragment><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></React.Fragment>,
                chevronDown: <polyline points="6 9 12 15 18 9"></polyline>,
                bridge: <React.Fragment><path d="M3 10c0-2.2 1.8-4 4-4h10c2.2 0 4 1.8 4 4"></path><path d="M3 14c0 2.2 1.8 4 4 4h10c2.2 0 4-1.8 4-4"></path><path d="M7 6v12"></path><path d="M17 6v12"></path></React.Fragment>,
                close: <React.Fragment><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></React.Fragment>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || icons.activity}
                </svg>
            );
        };

        // --- Config ---
        const NETWORKS = {
            ink: { id: '0x39', name: 'Ink', icon: 'https://raw.githubusercontent.com/ethereum/ethereum-org/main/public/assets/eth-diamond-purple.png' },
            base: { id: '0x2105', name: 'Base', icon: 'https://avatars.githubusercontent.com/u/108554348?s=200&v=4' },
            polygon: { id: '0x89', name: 'Polygon', icon: 'https://cryptologos.cc/logos/polygon-matic-logo.png' },
            arbitrum: { id: '0xa4b1', name: 'Arbitrum', icon: 'https://cryptologos.cc/logos/arbitrum-arb-logo.png' },
            optimism: { id: '0xa', name: 'Optimism', icon: 'https://cryptologos.cc/logos/optimism-ethereum-op-logo.png' },
            bnb: { id: '0x38', name: 'BNB Chain', icon: 'https://cryptologos.cc/logos/bnb-bnb-logo.png' }
        };

        const TOKEN_ADDRESSES = {
            USDT: {
                base: '0x50c5725949A6F0c72E6C45641f240226D82ce852',
                polygon: '0xc2132D05D31c914a87C6611C10748AEb04B58e8F',
                arbitrum: '0xFd086bC7CD5C481DCC9C85ebE478A1C0b69FCbb9',
                optimism: '0x94b008aA00579c1307B0EF2c499aD98a8ce58e58',
                bnb: '0x55d398326f99059fF775485246999027B3197955'
            },
            USDC: {
                base: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913',
                polygon: '0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359',
                arbitrum: '0xaf88d065e77c8cC2239326C5EDb3A432268e5831',
                optimism: '0x0b2C639c533813f4Aa9D7837CAf62653d097Ff85',
                bnb: '0x8AC76a51cc950d9822D68b83fE1Ad97B32Cd580d'
            },
            ANITA: { ink: '0x0606FC632ee812bA970af72F8489baAa443C4B98' }
        };

        const TOKENS = [
            { symbol: 'ETH', name: 'Ethereum', icon: 'https://cryptologos.cc/logos/ethereum-eth-logo.svg' },
            { symbol: 'USDT', name: 'Tether', icon: 'https://cryptologos.cc/logos/tether-usdt-logo.svg' },
            { symbol: 'USDC', name: 'USD Coin', icon: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.svg' },
            { symbol: 'ANITA', name: 'Anita', icon: 'https://api.dicebear.com/7.x/initials/svg?seed=ANITA&backgroundColor=b624ff' }
        ];

        const translations = {
            en: { swap: "Swap", bridge: "Bridge", connect: "Connect Wallet", from: "From", to: "To", pay: "Pay", receive: "Receive", btnSwap: "Swap Now", btnBridge: "Bridge Assets", fee: "Fee: 0.5%", waiting: "Processing...", success: "Success!", selectNet: "Select Network", selectToken: "Select Token", balance: "Balance" },
            fr: { swap: "Échange", bridge: "Pont", connect: "Connecter Wallet", from: "De", to: "À", pay: "Payer", receive: "Recevoir", btnSwap: "Échanger", btnBridge: "Transférer", fee: "Frais: 0.5%", waiting: "En cours...", success: "Réussi !", selectNet: "Choisir Réseau", selectToken: "Choisir Token", balance: "Solde" },
            zh: { swap: "兑换", bridge: "跨链桥", connect: "连接钱包", from: "从", to: "至", pay: "支付", receive: "接收", btnSwap: "立即兑换", btnBridge: "开始跨链", fee: "费用: 0.5%", waiting: "处理中...", success: "成功!", selectNet: "选择网络", selectToken: "选择代币", balance: "余额" }
        };

        function App() {
            const [mode, setMode] = useState('swap');
            const [lang, setLang] = useState('en');
            const [account, setAccount] = useState('');
            const [chainId, setChainId] = useState('');
            const [srcNetKey, setSrcNetKey] = useState('base');
            const [destNetKey, setDestNetKey] = useState('ink');
            const [tokenFrom, setTokenFrom] = useState(TOKENS[0]);
            const [tokenTo, setTokenTo] = useState(TOKENS[1]);
            const [amount, setAmount] = useState('');
            const [status, setStatus] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [balFrom, setBalFrom] = useState('0.00');
            const [balTo, setBalTo] = useState('0.00');
            const [loadingBal, setLoadingBal] = useState(false);

            const [showSrcNet, setShowSrcNet] = useState(false);
            const [showDestNet, setShowDestNet] = useState(false);
            const [showTokenFrom, setShowTokenFrom] = useState(false);
            const [showTokenTo, setShowTokenTo] = useState(false);

            const t = translations[lang];
            const srcNet = NETWORKS[srcNetKey];
            const destNet = mode === 'swap' ? srcNet : NETWORKS[destNetKey];
            
            // Normalize chainId for comparison
            const isCorrectNet = (id, netId) => {
                if (!id) return false;
                const normalizedId = id.startsWith('0x') ? id.toLowerCase() : '0x' + parseInt(id).toString(16).toLowerCase();
                return normalizedId === netId.toLowerCase();
            };

            const fetchBalance = useCallback(async (token, netKey, user) => {
                if (!window.ethereum || !user) return '0.00';
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    const net = NETWORKS[netKey];
                    
                    // Check if wallet is on the right network
                    const network = await provider.getNetwork();
                    const currentHex = '0x' + network.chainId.toString(16).toLowerCase();
                    if (currentHex !== net.id.toLowerCase()) return '0.00';

                    if (token.symbol === 'ETH') {
                        const b = await provider.getBalance(user);
                        return parseFloat(ethers.utils.formatEther(b)).toFixed(4);
                    } else {
                        const addr = TOKEN_ADDRESSES[token.symbol]?.[netKey];
                        if (!addr) return '0.00';
                        const contract = new ethers.Contract(addr, ["function balanceOf(address) view returns (uint256)"], provider);
                        const b = await contract.balanceOf(user);
                        const dec = (netKey === 'polygon' || netKey === 'bnb' || token.symbol === 'ANITA') ? 18 : 6;
                        return parseFloat(ethers.utils.formatUnits(b, dec)).toFixed(2);
                    }
                } catch (e) { return '0.00'; }
            }, []);

            const updateBalances = useCallback(async () => {
                if (!account) return;
                setLoadingBal(true);
                const b1 = await fetchBalance(tokenFrom, srcNetKey, account);
                setBalFrom(b1);
                if (mode === 'swap') {
                    const b2 = await fetchBalance(tokenTo, srcNetKey, account);
                    setBalTo(b2);
                } else {
                    setBalTo('0.00');
                }
                setLoadingBal(false);
            }, [account, tokenFrom, tokenTo, srcNetKey, mode, fetchBalance]);

            useEffect(() => {
                updateBalances();
                const interval = setInterval(updateBalances, 10000);
                return () => clearInterval(interval);
            }, [updateBalances]);

            const connectWallet = async () => {
                if (!window.ethereum) return setStatus('⚠️ No wallet found.');
                try {
                    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    setAccount(accs[0]);
                    const id = await window.ethereum.request({ method: 'eth_chainId' });
                    setChainId(id);
                    setStatus('');
                } catch (e) { setStatus('⚠️ Connection failed.'); }
            };

            const switchNet = async (key, isSource) => {
                const net = NETWORKS[key];
                if (isSource) {
                    setSrcNetKey(key); setShowSrcNet(false);
                    if (account && window.ethereum) {
                        try {
                            await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: net.id }] });
                        } catch (e) {
                            if (e.code === 4902) setStatus('Please add network manually.');
                        }
                    }
                } else { setDestNetKey(key); setShowDestNet(false); }
            };

            const handleSwitchTokens = () => {
                if (mode === 'swap') {
                    const tempT = tokenFrom; setTokenFrom(tokenTo); setTokenTo(tempT);
                } else {
                    const tempN = srcNetKey; setSrcNetKey(destNetKey); setDestNetKey(tempN);
                }
            };

            useEffect(() => {
                if (window.ethereum) {
                    window.ethereum.on('accountsChanged', (a) => setAccount(a[0] || ''));
                    window.ethereum.on('chainChanged', (id) => setChainId(id));
                }
            }, []);

            return (
                <div className="min-h-screen flex flex-col items-center pt-20 px-4 pb-10 bg-[#0a0d14]">
                    <div className="absolute top-0 left-1/4 w-[500px] h-[500px] bg-purple-600/5 blur-[120px] pointer-events-none"></div>
                    <div className="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-blue-600/5 blur-[120px] pointer-events-none"></div>

                    <nav className="w-full max-w-5xl flex justify-between items-center mb-10 z-50">
                        <div className="flex items-center gap-2 font-black text-2xl tracking-tighter">
                            <div className="bg-purple-600 p-1.5 rounded-xl">
                                <Icon name="activity" className="text-white" />
                            </div>
                            <span>Inkit</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="bg-[#131a2a] border border-slate-800 rounded-full px-3 py-1.5 flex items-center">
                                <Icon name="globe" size={14} className="text-slate-500 mr-2" />
                                <select value={lang} onChange={(e) => setLang(e.target.value)} className="bg-transparent text-xs font-bold outline-none cursor-pointer">
                                    <option value="en">EN</option><option value="fr">FR</option><option value="zh">ZH</option>
                                </select>
                            </div>
                            <button onClick={connectWallet} className="bg-[#131a2a] border border-slate-800 px-5 py-2 rounded-full text-sm font-bold flex items-center gap-2 hover:bg-[#1c2438] transition-colors">
                                <Icon name="wallet" size={16} className="text-purple-400" />
                                {account ? `${account.slice(0, 6)}...${account.slice(-4)}` : t.connect}
                            </button>
                        </div>
                    </nav>

                    <div className="w-full max-w-[480px] z-10">
                        <div className="flex bg-[#131a2a] p-1 rounded-2xl mb-4 border border-slate-800 shadow-xl">
                            <button onClick={() => setMode('swap')} className={`flex-1 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 ${mode === 'swap' ? 'bg-[#1c2438] text-white' : 'text-slate-500'}`}>
                                <Icon name="refresh" size={16} /> {t.swap}
                            </button>
                            <button onClick={() => setMode('bridge')} className={`flex-1 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 ${mode === 'bridge' ? 'bg-[#1c2438] text-white' : 'text-slate-500'}`}>
                                <Icon name="bridge" size={16} /> {t.bridge}
                            </button>
                        </div>

                        <div className="bg-[#131a2a] border border-slate-800 rounded-[32px] p-2 shadow-2xl relative">
                            <div className="bg-[#0d111c] rounded-[24px] p-5 border border-transparent hover:border-slate-800 transition-colors">
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex flex-col">
                                        <span className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">{t.from}</span>
                                        <span className="text-[10px] text-purple-400 font-bold tracking-tight">
                                            {t.balance}: {loadingBal ? '...' : balFrom}
                                        </span>
                                    </div>
                                    <div className="relative">
                                        <button onClick={() => setShowSrcNet(!showSrcNet)} className="flex items-center gap-2 bg-[#1c2438] px-3 py-1.5 rounded-full border border-slate-700 hover:border-purple-500 transition-all">
                                            <img src={srcNet.icon} className="w-4 h-4 rounded-full" />
                                            <span className="text-xs font-bold">{srcNet.name}</span>
                                            <Icon name="chevronDown" size={12} />
                                        </button>
                                        {showSrcNet && (
                                            <div className="absolute top-10 right-0 w-40 bg-[#1a2133] border border-slate-700 rounded-xl p-1 z-50 shadow-2xl">
                                                {Object.entries(NETWORKS).map(([k, n]) => (
                                                    <div key={k} onClick={() => switchNet(k, true)} className="flex items-center gap-2 p-2.5 hover:bg-slate-700 rounded-lg cursor-pointer text-xs font-medium">
                                                        <img src={n.icon} className="w-4 h-4 rounded-full" /> {n.name}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="flex justify-between items-center gap-4">
                                    <input type="number" placeholder="0" value={amount} onChange={(e) => setAmount(e.target.value)} className="bg-transparent text-4xl font-medium w-full outline-none placeholder:text-slate-800" />
                                    <button onClick={() => setShowTokenFrom(true)} className="flex items-center gap-2 bg-[#1c2438] px-3 py-2 rounded-full font-bold shrink-0 border border-slate-700 shadow-sm">
                                        <img src={tokenFrom.icon} className="w-6 h-6 rounded-full" /> 
                                        <span>{tokenFrom.symbol}</span>
                                        <Icon name="chevronDown" size={14} className="text-slate-500" />
                                    </button>
                                </div>
                            </div>

                            <div className="flex justify-center -my-3 relative z-20">
                                <div className="bg-[#131a2a] p-1 rounded-xl">
                                    <button onClick={handleSwitchTokens} className="bg-[#1c2438] p-2 rounded-xl border border-slate-800 text-purple-400 shadow-lg hover:text-white transition-all active:scale-90">
                                        {mode === 'swap' ? <Icon name="arrowDown" size={20} /> : <Icon name="bridge" size={20} />}
                                    </button>
                                </div>
                            </div>

                            <div className="bg-[#0d111c] rounded-[24px] p-5 border border-transparent hover:border-slate-800 transition-colors">
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex flex-col">
                                        <span className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">{t.to}</span>
                                        <span className="text-[10px] text-purple-400 font-bold tracking-tight">
                                            {t.balance}: {loadingBal ? '...' : balTo}
                                        </span>
                                    </div>
                                    <div className="relative">
                                        <button disabled={mode === 'swap'} onClick={() => setShowDestNet(!showDestNet)} className={`flex items-center gap-2 bg-[#1c2438] px-3 py-1.5 rounded-full border border-slate-700 ${mode === 'swap' ? 'opacity-70' : 'hover:border-purple-500'}`}>
                                            <img src={destNet.icon} className="w-4 h-4 rounded-full" />
                                            <span className="text-xs font-bold">{destNet.name}</span>
                                            {mode === 'bridge' && <Icon name="chevronDown" size={12} />}
                                        </button>
                                        {showDestNet && mode === 'bridge' && (
                                            <div className="absolute top-10 right-0 w-40 bg-[#1a2133] border border-slate-700 rounded-xl p-1 z-50 shadow-2xl">
                                                {Object.entries(NETWORKS).map(([k, n]) => (
                                                    <div key={k} onClick={() => switchNet(k, false)} className="flex items-center gap-2 p-2.5 hover:bg-slate-700 rounded-lg cursor-pointer text-xs font-medium">
                                                        <img src={n.icon} className="w-4 h-4 rounded-full" /> {n.name}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="flex justify-between items-center gap-4">
                                    <div className="text-4xl font-medium text-slate-400 truncate">{amount ? (amount * 0.995).toFixed(2) : "0"}</div>
                                    <button onClick={() => setShowTokenTo(true)} className="flex items-center gap-2 bg-[#1c2438] px-3 py-2 rounded-full font-bold shrink-0 border border-slate-700 shadow-sm">
                                        <img src={tokenTo.icon} className="w-6 h-6 rounded-full" /> 
                                        <span>{tokenTo.symbol}</span>
                                        <Icon name="chevronDown" size={14} className="text-slate-500" />
                                    </button>
                                </div>
                            </div>

                            <div className="p-2 mt-2">
                                {status && <div className="mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-center text-xs text-red-400">{status}</div>}
                                {!account ? (
                                    <button onClick={connectWallet} className="w-full bg-purple-600 py-4 rounded-2xl font-bold text-lg active:scale-95 transition-all shadow-lg shadow-purple-600/20">{t.connect}</button>
                                ) : !isCorrectNet(chainId, srcNet.id) ? (
                                    <button onClick={() => switchNet(srcNetKey, true)} className="w-full bg-red-500/10 text-red-400 py-4 rounded-2xl font-bold border border-red-500/20 flex justify-center items-center gap-2">
                                        <Icon name="alert" size={20} /> {t.switchNet} {srcNet.name}
                                    </button>
                                ) : !amount ? (
                                    <button disabled className="w-full bg-[#1c2438] text-slate-600 py-4 rounded-2xl font-bold">{t.enterAmount}</button>
                                ) : (
                                    <button onClick={() => { setIsLoading(true); setTimeout(() => { setIsLoading(false); setStatus('✅ Simulation: Action Success!'); setAmount(''); setTimeout(() => setStatus(''), 4000); }, 3000); }} disabled={isLoading} className="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all text-lg flex justify-center items-center gap-2">
                                        {isLoading && <Icon name="refresh" className="animate-spin" />} {isLoading ? t.waiting : (mode === 'swap' ? t.btnSwap : t.btnBridge)}
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>

                    {(showTokenFrom || showTokenTo) && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 backdrop-blur-sm bg-black/80">
                            <div className="relative w-full max-w-sm bg-[#131a2a] border border-slate-800 rounded-[32px] p-6 shadow-2xl animate-in fade-in zoom-in duration-200">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold">{t.selectToken}</h3>
                                    <button onClick={() => {setShowTokenFrom(false); setShowTokenTo(false);}} className="text-slate-500 hover:text-white"><Icon name="close" size={24} /></button>
                                </div>
                                <div className="space-y-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                    {TOKENS.map(token => {
                                        const isAvailable = token.symbol !== 'ANITA' || srcNetKey === 'ink';
                                        return (
                                            <div key={token.symbol} 
                                                onClick={() => { if (isAvailable) { if (showTokenFrom) setTokenFrom(token); else setTokenTo(token); setShowTokenFrom(false); setShowTokenTo(false); }}}
                                                className={`flex items-center justify-between p-4 rounded-2xl border border-transparent transition-all ${isAvailable ? 'hover:bg-slate-800 cursor-pointer hover:border-slate-700' : 'opacity-40 cursor-not-allowed grayscale'}`}
                                            >
                                                <div className="flex items-center gap-4">
                                                    <img src={token.icon} className="w-8 h-8 rounded-full shadow-md" />
                                                    <div><p className="font-bold">{token.symbol}</p><p className="text-xs text-slate-500">{token.name}</p></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
