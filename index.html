<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkit - Swap & Bridge (Final Fix)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
</head>
<body class="bg-[#0a0d14] text-white font-sans overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // Icons Component
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>,
                globe: <React.Fragment><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></React.Fragment>,
                alert: <React.Fragment><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></React.Fragment>,
                wallet: <React.Fragment><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></React.Fragment>,
                arrowDown: <React.Fragment><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></React.Fragment>,
                refresh: <React.Fragment><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></React.Fragment>,
                chevronDown: <polyline points="6 9 12 15 18 9"></polyline>,
                bridge: <React.Fragment><path d="M3 10c0-2.2 1.8-4 4-4h10c2.2 0 4 1.8 4 4"></path><path d="M3 14c0 2.2 1.8 4 4 4h10c2.2 0 4-1.8 4-4"></path><path d="M7 6v12"></path><path d="M17 6v12"></path></React.Fragment>,
                close: <React.Fragment><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></React.Fragment>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || icons.activity}
                </svg>
            );
        };

        const NETWORKS = {
            base: { id: '0x2105', decimalId: 8453, name: 'Base', rpcs: ['https://mainnet.base.org'], icon: 'https://avatars.githubusercontent.com/u/108554348?s=200&v=4' },
            ink: { id: '0xde91', decimalId: 57073, name: 'Ink', rpcs: ['https://rpc-gel.inkonchain.com'], icon: 'https://raw.githubusercontent.com/ethereum/ethereum-org/main/public/assets/eth-diamond-purple.png' },
            polygon: { id: '0x89', decimalId: 137, name: 'Polygon', rpcs: ['https://polygon-rpc.com'], icon: 'https://cryptologos.cc/logos/polygon-matic-logo.png' },
            arbitrum: { id: '0xa4b1', decimalId: 42161, name: 'Arbitrum', rpcs: ['https://arb1.arbitrum.io/rpc'], icon: 'https://cryptologos.cc/logos/arbitrum-arb-logo.png' },
            optimism: { id: '0xa', decimalId: 10, name: 'Optimism', rpcs: ['https://mainnet.optimism.io'], icon: 'https://cryptologos.cc/logos/optimism-ethereum-op-logo.png' },
            bnb: { id: '0x38', decimalId: 56, name: 'BNB Chain', rpcs: ['https://bsc-dataseed.binance.org'], icon: 'https://cryptologos.cc/logos/bnb-bnb-logo.png' }
        };

        const TOKEN_ADDRESSES = {
            ETH: { base: '0x0000000000000000000000000000000000000000', ink: '0x0000000000000000000000000000000000000000' },
            USDT: { base: '0xfde4c96c8593536e31f229ea8f37b2ada2699bb2', polygon: '0xc2132D05D31c914a87C6611C10748AEb04B58e8F' },
            USDC: { base: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913' },
            ANITA: { ink: '0x0606FC632ee812bA970af72F8489baAa443C4B98' }
        };

        const TOKENS = [
            { symbol: 'ETH', name: 'Ethereum', icon: 'https://cryptologos.cc/logos/ethereum-eth-logo.svg', decimals: 18 },
            { symbol: 'USDT', name: 'Tether', icon: 'https://cryptologos.cc/logos/tether-usdt-logo.svg', decimals: 6 },
            { symbol: 'USDC', name: 'USD Coin', icon: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.svg', decimals: 6 },
            { symbol: 'ANITA', name: 'Anita', icon: 'https://api.dicebear.com/7.x/initials/svg?seed=ANITA&backgroundColor=b624ff', decimals: 18 }
        ];

        function App() {
            // ALL States declared at top
            const [mode, setMode] = useState('swap');
            const [lang, setLang] = useState('en');
            const [account, setAccount] = useState('');
            const [chainId, setChainId] = useState('');
            const [srcNetKey, setSrcNetKey] = useState('base');
            const [destNetKey, setDestNetKey] = useState('ink');
            const [tokenFrom, setTokenFrom] = useState(TOKENS[0]);
            const [tokenTo, setTokenTo] = useState(TOKENS[1]);
            const [amount, setAmount] = useState('');
            const [quoteAmount, setQuoteAmount] = useState('0');
            const [status, setStatus] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [balFrom, setBalFrom] = useState('0.00');
            const [balTo, setBalTo] = useState('0.00');
            const [loadingBal, setLoadingBal] = useState(false);

            const [showSrcNet, setShowSrcNet] = useState(false);
            const [showDestNet, setShowDestNet] = useState(false);
            const [showTokenFrom, setShowTokenFrom] = useState(false);
            const [showTokenTo, setShowTokenTo] = useState(false);

            const srcNet = NETWORKS[srcNetKey];
            const destNet = mode === 'swap' ? srcNet : NETWORKS[destNetKey];

            const normalizeHex = (hex) => {
                if (!hex) return "";
                const h = hex.toString();
                return h.startsWith('0x') ? h.toLowerCase() : '0x' + parseInt(h).toString(16).toLowerCase();
            };

            const fetchBalance = useCallback(async (token, netKey, user) => {
                if (!user) return '0.00';
                try {
                    const net = NETWORKS[netKey];
                    const provider = new ethers.providers.JsonRpcProvider(net.rpcs[0]);
                    const addr = TOKEN_ADDRESSES[token.symbol]?.[netKey] || '0x0000000000000000000000000000000000000000';

                    if (addr === '0x0000000000000000000000000000000000000000') {
                        const b = await provider.getBalance(user);
                        return parseFloat(ethers.utils.formatEther(b)).toFixed(4);
                    } else {
                        const contract = new ethers.Contract(addr, ["function balanceOf(address) view returns (uint256)"], provider);
                        const b = await contract.balanceOf(user);
                        const decimals = (token.symbol === 'USDT' || token.symbol === 'USDC') ? (netKey === 'polygon' || netKey === 'bnb' ? 18 : 6) : 18;
                        return parseFloat(ethers.utils.formatUnits(b, decimals)).toFixed(2);
                    }
                } catch (e) { return '0.00'; }
            }, []);

            const updateBalances = useCallback(async () => {
                if (!account) return;
                setLoadingBal(true);
                try {
                    const [b1, b2] = await Promise.all([
                        fetchBalance(tokenFrom, srcNetKey, account),
                        mode === 'swap' ? fetchBalance(tokenTo, srcNetKey, account) : fetchBalance(tokenFrom, destNetKey, account)
                    ]);
                    setBalFrom(b1); setBalTo(b2);
                } finally { setLoadingBal(false); }
            }, [account, tokenFrom, tokenTo, srcNetKey, destNetKey, mode, fetchBalance]);

            useEffect(() => { if(account) updateBalances(); }, [account, updateBalances]);

            const connectWallet = async () => {
                if (!window.ethereum) return setStatus('⚠️ Install Rabby/MetaMask');
                try {
                    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    setAccount(accs[0]);
                    const id = await window.ethereum.request({ method: 'eth_chainId' });
                    setChainId(normalizeHex(id));
                } catch (e) { setStatus('⚠️ Failed'); }
            };

            const switchNet = async (key, isSource) => {
                const net = NETWORKS[key];
                if (isSource) {
                    setSrcNetKey(key); setShowSrcNet(false);
                    if (account && window.ethereum) {
                        try { await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: net.id }] }); } catch (e) {}
                    }
                } else { setDestNetKey(key); setShowDestNet(false); }
            };

            return (
                <div className="min-h-screen flex flex-col items-center pt-10 px-4 pb-10 bg-[#0a0d14]">
                    <nav className="w-full max-w-5xl flex justify-between items-center mb-10 z-50 p-4 bg-white/5 rounded-3xl border border-white/5">
                        <div className="flex items-center gap-2 font-black text-2xl tracking-tighter">
                            <div className="bg-purple-600 p-1.5 rounded-xl"><Icon name="activity" className="text-white" /></div>
                            <span>Inkit</span>
                        </div>
                        <button onClick={connectWallet} className="bg-[#131a2a] border border-slate-800 px-5 py-2 rounded-full text-sm font-bold flex items-center gap-2 hover:bg-[#1c2438]">
                            <Icon name="wallet" size={16} className="text-purple-400" />
                            {account ? `${account.slice(0, 6)}...${account.slice(-4)}` : "Connect Wallet"}
                        </button>
                    </nav>

                    <div className="w-full max-w-[480px] z-10">
                        <div className="flex bg-[#131a2a] p-1.5 rounded-2xl mb-6 border border-slate-800 shadow-xl">
                            <button onClick={() => setMode('swap')} className={`flex-1 py-3 rounded-xl font-bold text-sm ${mode === 'swap' ? 'bg-[#1c2438] text-white shadow-lg' : 'text-slate-500'}`}>Swap</button>
                            <button onClick={() => setMode('bridge')} className={`flex-1 py-3 rounded-xl font-bold text-sm ${mode === 'bridge' ? 'bg-[#1c2438] text-white shadow-lg' : 'text-slate-500'}`}>Bridge</button>
                        </div>

                        <div className="bg-[#131a2a] border border-slate-800 rounded-[32px] p-2 shadow-2xl">
                            {/* FROM */}
                            <div className="bg-[#0d111c] rounded-[26px] p-6 border border-white/5">
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">From</span>
                                        <span className="text-xs text-purple-400 font-bold">Balance: {loadingBal ? '...' : balFrom}</span>
                                    </div>
                                    <button onClick={() => setShowSrcNet(true)} className="flex items-center gap-2 bg-[#1c2438] px-3 py-1.5 rounded-full border border-slate-700">
                                        <img src={srcNet.icon} className="w-4 h-4 rounded-full" />
                                        <span className="text-xs font-bold">{srcNet.name}</span>
                                        <Icon name="chevronDown" size={12} />
                                    </button>
                                </div>
                                <div className="flex justify-between items-center">
                                    <input type="number" placeholder="0" value={amount} onChange={(e) => setAmount(e.target.value)} className="bg-transparent text-4xl font-bold w-full outline-none text-white" />
                                    <button onClick={() => setShowTokenFrom(true)} className="flex items-center gap-2 bg-[#1c2438] px-3 py-2 rounded-full font-bold shrink-0 border border-slate-700">
                                        <img src={tokenFrom.icon} className="w-6 h-6 rounded-full" /> <span>{tokenFrom.symbol}</span>
                                    </button>
                                </div>
                            </div>

                            <div className="flex justify-center -my-4 relative z-20">
                                <button onClick={() => {if(mode==='swap'){setTokenFrom(tokenTo); setTokenTo(tokenFrom);}else{const s=srcNetKey; setSrcNetKey(destNetKey); setDestNetKey(s);}}} className="bg-[#1c2438] p-3 rounded-xl border border-slate-800 text-purple-400 shadow-xl active:scale-90 transition-all">
                                    {mode === 'swap' ? <Icon name="arrowDown" size={20} /> : <Icon name="bridge" size={20} />}
                                </button>
                            </div>

                            {/* TO */}
                            <div className="bg-[#0d111c] rounded-[26px] p-6 border border-white/5 mt-1">
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">To</span>
                                        <span className="text-xs text-purple-400 font-bold">Balance: {loadingBal ? '...' : balTo}</span>
                                    </div>
                                    <button disabled={mode === 'swap'} onClick={() => setShowDestNet(true)} className={`flex items-center gap-2 bg-[#1c2438] px-3 py-1.5 rounded-full border border-slate-700 ${mode === 'swap' ? 'opacity-50' : ''}`}>
                                        <img src={destNet.icon} className="w-4 h-4 rounded-full" />
                                        <span className="text-xs font-bold">{destNet.name}</span>
                                        {mode === 'bridge' && <Icon name="chevronDown" size={12} />}
                                    </button>
                                </div>
                                <div className="flex justify-between items-center">
                                    <div className="text-4xl font-bold text-slate-400">0.00</div>
                                    <button onClick={() => setShowTokenTo(true)} className="flex items-center gap-2 bg-[#1c2438] px-3 py-2 rounded-full font-bold shrink-0 border border-slate-700">
                                        <img src={tokenTo.icon} className="w-6 h-6 rounded-full" /> <span>{tokenTo.symbol}</span>
                                    </button>
                                </div>
                            </div>

                            <div className="p-3 mt-4">
                                {status && <div className="mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-center text-xs text-red-400">{status}</div>}
                                {!account ? (
                                    <button onClick={connectWallet} className="w-full bg-purple-600 py-4 rounded-2xl font-black text-lg shadow-xl">Connect Wallet</button>
                                ) : (normalizeHex(chainId) !== srcNet.id.toLowerCase()) ? (
                                    <button onClick={() => switchNet(srcNetKey, true)} className="w-full bg-red-500/10 text-red-400 py-4 rounded-2xl font-bold border border-red-500/20">Switch to {srcNet.name}</button>
                                ) : (
                                    <button onClick={() => {setIsLoading(true); setTimeout(()=>{setIsLoading(false); setStatus('✅ Success (Simulation)'); setTimeout(()=>setStatus(''), 3000);}, 2000);}} className="w-full bg-gradient-to-r from-purple-600 to-blue-600 py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all">
                                        {isLoading ? "Processing..." : (mode === 'swap' ? "Swap Now" : "Bridge Assets")}
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Network Modal */}
                    {(showSrcNet || showDestNet) && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className="bg-[#131a2a] border border-white/10 rounded-[36px] p-7 w-full max-w-sm">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold">Select Network</h3>
                                    <button onClick={() => {setShowSrcNet(false); setShowDestNet(false);}}><Icon name="close" /></button>
                                </div>
                                <div className="space-y-2">
                                    {Object.entries(NETWORKS).map(([k, n]) => (
                                        <div key={k} onClick={() => switchNet(k, showSrcNet)} className="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl cursor-pointer">
                                            <img src={n.icon} className="w-8 h-8 rounded-full" />
                                            <span className="font-bold">{n.name}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Token Modal */}
                    {(showTokenFrom || showTokenTo) && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className="bg-[#131a2a] border border-white/10 rounded-[36px] p-7 w-full max-w-sm">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold">Select Token</h3>
                                    <button onClick={() => {setShowTokenFrom(false); setShowTokenTo(false);}}><Icon name="close" /></button>
                                </div>
                                <div className="space-y-2">
                                    {TOKENS.map(token => (
                                        <div key={token.symbol} onClick={() => {if(showTokenFrom) setTokenFrom(token); else setTokenTo(token); setShowTokenFrom(false); setShowTokenTo(false);}} className="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl cursor-pointer">
                                            <img src={token.icon} className="w-8 h-8 rounded-full" />
                                            <span className="font-bold">{token.symbol}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
